  <!-- ══ Performance: DNS Prefetch & Preconnect ══ -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://www.gstatic.com" />

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      font-family: 'Outfit', sans-serif
    }

    body {
      background: linear-gradient(135deg, #78350f 0%, #b45309 45%, #f59e0b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Animated background circles */
    .bg-circles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, .06);
      animation: pulse 4s ease-in-out infinite;
    }

    .c1 {
      width: 400px;
      height: 400px;
      top: -100px;
      right: -100px;
      animation-delay: 0s
    }

    .c2 {
      width: 250px;
      height: 250px;
      bottom: -80px;
      left: -60px;
      animation-delay: 1.5s
    }

    .c3 {
      width: 180px;
      height: 180px;
      top: 40%;
      left: 5%;
      animation-delay: 3s
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: .6
      }

      50% {
        transform: scale(1.1);
        opacity: 1
      }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, .12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, .25);
      border-radius: 28px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 24px 60px rgba(0, 0, 0, .3);
      animation: slideUp .7s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(40px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    .logo-wrap {
      width: 90px;
      height: 90px;
      margin: 0 auto 1.25rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, .2);
      border: 3px solid rgba(255, 255, 255, .4);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .shop-name {
      font-size: 2.2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.02em;
      margin-bottom: .25rem;
    }

    .tagline {
      color: rgba(255, 255, 255, .8);
      font-size: .95rem;
      margin-bottom: 2rem;
    }

    .emoji-row {
      display: flex;
      justify-content: center;
      gap: .5rem;
      font-size: 1.6rem;
      margin-bottom: 1.75rem;
      animation: float 3s ease-in-out infinite;
    }

    .emoji-row span:nth-child(2) {
      animation-delay: .4s
    }

    .emoji-row span:nth-child(3) {
      animation-delay: .8s
    }

    .emoji-row span:nth-child(4) {
      animation-delay: 1.2s
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-8px)
      }
    }

    .enter-btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: #fff;
      color: #92400e;
      font-size: 1rem;
      font-weight: 700;
      padding: .8rem 2rem;
      border-radius: 99px;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .2);
      transition: transform .2s, box-shadow .2s;
      text-decoration: none;
      animation: glow 2s ease-in-out infinite;
    }

    .enter-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, .3)
    }

    @keyframes glow {

      0%,
      100% {
        box-shadow: 0 8px 24px rgba(0, 0, 0, .2)
      }

      50% {
        box-shadow: 0 8px 32px rgba(245, 158, 11, .5)
      }
    }

    .redirect-note {
      margin-top: 1rem;
      font-size: .78rem;
      color: rgba(255, 255, 255, .6);
    }

    .bar-wrap {
      width: 160px;
      height: 3px;
      background: rgba(255, 255, 255, .2);
      border-radius: 99px;
      margin: .5rem auto 0;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: rgba(255, 255, 255, .7);
      border-radius: 99px;
      transition: none;
    }
  </style>

<body>
  <div class="bg-circles">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
  </div>

  <div class="card">
    <div class="logo-wrap">
      <img src="cafe_icon.jpg" alt="V3 Cafe" onerror="this.parentElement.textContent='🧁'" />
    </div>
    <div class="shop-name">V3 Cafe</div>
    <div class="tagline">Fresh Baked with Love 🤍</div>
    <div class="emoji-row">
      <span>🎂</span><span>🧁</span><span>🍰</span><span>🍪</span>
    </div>
    <a href="customer/index.html" class="enter-btn" id="enter-btn">
      🛒 Explore Menu
    </a>
    <p class="redirect-note">Redirecting you automatically…</p>
    <div class="bar-wrap">
      <div class="bar" id="progress-bar"></div>
    </div>
  </div>

  <script type="module">
    import { db, getAllProducts } from "./connection/connection.js";
    import { ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ── BACKGROUND PREFETCHING ──
    // While the 2-second splash screen runs, we aggressively fetch all data
    // and cache it so the main app loads with ZERO delay.
    async function prefetchData() {
      try {
        // 1. Fetch & Cache Settings
        get(ref(db, "settings/shop")).then(snap => {
          if (snap.exists()) {
            localStorage.setItem("v3_shopSettings", JSON.stringify(snap.val()));
          }
        }).catch(() => { });

        // 2. Fetch & Cache Products
        const products = await getAllProducts({ force: true });
        if (products && products.length > 0) {
          try {
            localStorage.setItem("v3_allProducts", JSON.stringify({
              data: products,
              time: Date.now()
            }));
          } catch (e) {
            if (e.name === 'QuotaExceededError') {
              localStorage.removeItem("v3_image_cache");
              localStorage.setItem("v3_allProducts", JSON.stringify({ data: products, time: Date.now() }));
            }
          }

          // 3. Pre-download all main images into browser HTTP cache & LocalStorage
          const imageCache = JSON.parse(localStorage.getItem("v3_image_cache") || "{}");

          // --- Garbage Collection (Prevent 5MB crash) ---
          // Gather all current valid image URLs
          const currentUrls = products.map(p => p.image || p.mainImage).filter(Boolean);
          let cacheChanged = false;

          // Delete any cached Base64 that is no longer in the active products list
          for (const cachedUrl in imageCache) {
            if (!currentUrls.includes(cachedUrl)) {
              delete imageCache[cachedUrl];
              cacheChanged = true;
            }
          }
          if (cacheChanged) {
            try { localStorage.setItem("v3_image_cache", JSON.stringify(imageCache)); } catch (e) { }
          }
          // ----------------------------------------------

          products.forEach(p => {
            const imgUrl = p.image || p.mainImage;
            if (imgUrl) {
              const img = new Image();
              img.crossOrigin = "Anonymous"; // Required for Canvas export
              img.src = imgUrl;

              // Save to LocalStorage as High-Quality Base64 (Using URL as key so updates work!)
              if (!imageCache[imgUrl]) {
                img.onload = () => {
                  try {
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");
                    const max = 400; // Increased size for High Quality (Best)
                    let w = img.width, h = img.height;
                    if (w > max || h > max) {
                      if (w > h) { h = Math.round(h * max / w); w = max; }
                      else { w = Math.round(w * max / h); h = max; }
                    }
                    canvas.width = w; canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);

                    // Use WebP for best quality/size ratio
                    imageCache[imgUrl] = canvas.toDataURL("image/webp", 0.92);
                    localStorage.setItem("v3_image_cache", JSON.stringify(imageCache));
                  } catch (e) {
                    // CORS or Quota error: Silent fail, HTTP cache still works
                  }
                };
              }
            }
          });
        }
      } catch (e) {
        console.warn("Prefetch skipped (will load normally):", e);
      }
    }

    // Start prefetch immediately
    prefetchData();

    // ── SPLASH SCREEN ANIMATION & REDIRECT ──
    const bar = document.getElementById('progress-bar');
    let pct = 0;
    const iv = setInterval(() => {
      pct += 2;
      bar.style.width = pct + '%';
      if (pct >= 100) {
        clearInterval(iv);
        window.location.replace('customer/index.html');
      }
    }, 40); // 40ms × 50 steps = 2 seconds

    // Manual click cancels timer and redirects instantly
    document.getElementById('enter-btn').addEventListener('click', () => clearInterval(iv));
  </script>
</body>
